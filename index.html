<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance of Power</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>Balance <span class="of">of</span> Power</h1>
        <p class="subtitle">World leaders — live data from Wikidata</p>
      </div>
      <a class="gh-link" href="https://github.com/tom-lev/Balance-Of-Power" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </a>
    </div>
  </header>

  <main>
    <div class="controls">
      <input type="text" id="search" placeholder="Search country or name..." />
      <select id="roleFilter">
        <option value="">All roles</option>
        <option value="Prime Minister">Prime Minister</option>
        <option value="President">President</option>
        <option value="Monarch">Monarch</option>
        <option value="Other">Other</option>
      </select>
      <select id="genderFilter">
        <option value="">All genders</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <div id="stats" class="stats"></div>

    <div id="loadMsg" class="load-msg">Loading data from Wikidata...</div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="table-wrap">
      <table id="mainTable" style="display:none;">
        <thead>
          <tr>
            <th data-col="country">Country</th>
            <th data-col="person">Name</th>
            <th data-col="role">Role</th>
            <th data-col="gender">Gender</th>
            <th data-col="age">Age</th>
            <th data-col="yearsInOffice">Years in office</th>
            <th data-col="startDate">Since</th>
            <th data-col="occupation">Occupation</th>
            <th data-col="religion">Religion</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="pagination" class="pagination"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
